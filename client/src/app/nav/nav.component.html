<nav class="navbar custom-nav px-4">
  <div
    class="container-fluid d-flex justify-content-between align-items-center p-0"
  >
    <a class="navbar-brand" routerLink="/" routerLinkActive="active"
      >THE LAST OF THEM</a
    >

    <div
      class="d-flex align-items-center gap-2"
      *ngIf="!(userService.currrentUser$ | async)"
    >
      <form
        #loginForm="ngForm"
        (ngSubmit)="login()"
        class="d-flex align-items-center gap-2 m-0 position-relative"
      >
        <input
          type="text"
          name="username"
          required
          [(ngModel)]="model.username"
          class="form-control nav-input"
          placeholder="Username"
          autocomplete="off"
        />

        <input
          type="password"
          name="password"
          required
          [(ngModel)]="model.password"
          class="form-control nav-input"
          placeholder="Password"
        />

        <button type="submit" class="btn btn-login">Login</button>

        <div *ngIf="errorLogin" class="error-flotante shadow">
          <i class="bi bi-exclamation-triangle-fill me-1"></i> {{ errorLogin }}
        </div>
      </form>

      <button
        class="btn btn-register"
        routerLink="/register"
        routerLinkActive="active"
      >
        Register
      </button>
    </div>

    <div
      class="d-flex align-items-center gap-2 user-welcome"
      *ngIf="userService.currrentUser$ | async as user"
    >
      <span>Welcome <strong>{{ user.username }}</strong></span>

      <button class="btn btn-register ms-2" (click)="logOut()">Exit</button>
    </div>
  </div>
</nav>
