  <section class="search-section mt-5 pt-4 text-center">
    <h2 class="mb-4">Explorer</h2>
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-7">
        <div class="input-group input-group-lg shadow-sm mb-3">
          <input
            type="text"
            class="form-control custom-search-input"
            placeholder="Search by common or scientific name..."
            [(ngModel)]="filtrosBusqueda.NombreBusqueda"
          />
          <button class="btn btn-search" (click)="onSearch()">
            <i class="bi bi-search me-2"></i>Search
          </button>
        </div>

        <div class="d-flex flex-wrap justify-content-center gap-2 mb-3">
          <div class="dropdown">
            <button
              class="btn btn-outline-secondary dropdown-toggle"
              type="button"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              Kingdom
            </button>
            <div class="dropdown-menu p-3">
              <div class="form-check" *ngFor="let reino of reinos" (click)="$event.stopPropagation()">
                <input
                  class="form-check-input"
                  type="checkbox"
                  [id]="'reino-' + reino"
                  [(ngModel)]="filtrosBusqueda.Reinos[reino]"
                />
                <label class="form-check-label" [for]="reino">{{ reino }}</label>
              </div>
            </div>
          </div>

          <div class="dropdown">
            <button
              class="btn btn-outline-secondary dropdown-toggle"
              type="button"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              RedList Category
            </button>
            <div class="dropdown-menu p-3">
              <div class="form-check" *ngFor="let r of redlist">
                <input
                  class="form-check-input"
                  type="checkbox"
                  [id]="r"
                  [(ngModel)]="filtrosBusqueda.Redlist[r]"
                />
                <label class="form-check-label" [for]="r">{{ r }}</label>
              </div>
            </div>
          </div>

          <div class="dropdown">
            <button
              class="btn btn-outline-secondary dropdown-toggle"
              type="button"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              Continent
            </button>
            <div class="dropdown-menu p-3">
              <div class="form-check" *ngFor="let cont of continentes">
                <input
                  class="form-check-input"
                  type="checkbox"
                  [id]="cont"
                  [(ngModel)]="filtrosBusqueda.Continentes[cont]"
                />
                <label class="form-check-label" [for]="cont">{{ cont }}</label>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
